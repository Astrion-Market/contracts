name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build WASM
        run: cargo build --workspace --target wasm32v1-none --release
      - name: WASM size report
        run: |
          mkdir -p artifacts
          find target/wasm32v1-none/release -maxdepth 1 -name '*.wasm' -printf '%f %s bytes\n' | sort > artifacts/wasm-sizes.txt
          cat artifacts/wasm-sizes.txt
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-size-report
          path: artifacts/wasm-sizes.txt

  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Collect test output
        run: |
          mkdir -p coverage
          cargo test --workspace -- --format terse | tee coverage/test-output.txt
          tar -czf coverage-artifacts.tar.gz coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: coverage-artifacts.tar.gz
